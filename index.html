<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-card">

        <h2>Login</h2>

        <form>

            <label for="email">
                Email
            </label>

            <input
                type="email"
                id="email"
                placeholder="Enter your email"
            >

            <label for="password">
                Password
            </label>

            <div class="password-container">

                <input
                    type="password"
                    id="password"
                    placeholder="Enter your password"
                >

                <button
                    type="button"
                    id="togglePassword"
                >
                    👁️
                </button>

            </div>

            <button
                type="submit"
                class="login-btn"
            >
                Login
            </button>

        </form>

    </div>

    <script src="script.js"></script>

</body>
</html>
